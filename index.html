<!DOCTYPE html>
<html lang="zh-Hant">
<html>
<head>
   
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>七夕收涎儀式流程</title>
    <style>
        body {
            /* 1. 設定背景圖片路徑 */
            background-image: url('web工作區域 1.png'); 
            
            background-size: 100% auto;
           
            
            /* 3. 讓背景固定不隨捲軸移動 */
            background-attachment: scroll;
            
            /* 4. 置中對齊 */
            background-position: center top;
            background-repeat: no-repeat;
            min-height: 100vh;
            background-color: #a24731;

        /* 設定標題顏色與大小 */
        h1 {
            text-align: Center; /* 讓內容居中 */
            color: #e99e9d;
            font-size: 60px; /* 標題字體大小 */
        }

        /* 設定段落文字大小 */
        p {
            text-align: Left; /* 讓內容居中 */
            font-size: 25px;
            line-height: 1.6;
            color: #ffffff; /* 文字顏色 */
        }

        /* 設定圖片樣式 */
        img {
            border-radius: 15px; /* 讓圖片圓角 */
            margin-top: 20px;
        }
    </style>
</head>
<body>

   <div class="content">
    <h1>七夕收涎儀式流程</h1>
    
    <p>
1.準備祭拜織女的供桌跟七夕粿。<br>
    <div style="display: flex; gap: 10px; justify-content: center;">
    <img src="web1.png" style="width: 50%">
    <img src="web2.png" style="width: 50%"></div><br>
    </p>
    <p>
2.讓小孩的雙腳跨在戶碇兩旁。<br>
    <div style="display: flex; gap: 10px; justify-content: center;">
    <img src="web3.png" style="width: 50%"></div><br>
    </p>
    <p>
3.用七夕粿擦嘴。<br>
    <div style="display: flex; gap: 10px; justify-content: center;">
    <img src="web4.png" style="width: 50%"></div><br>
    </p>
    <p>
4.讓小孩咬一小口七夕粿吐在地上，家長唸：「丟一口粿，死後入土，乎六畜吞入肚，保我兒孫無事故。」<br>
    <div style="display: flex; gap: 10px; justify-content: center;">
    <img src="web5.png" style="width: 50%"></div><br>
    </p>
    <p>
    <div style="display: flex; gap: 10px; justify-content: center;">

    <div style="display: flex; gap: 10px; justify-content: center;">
    <img src="web5.png" style="width: 50%"></div><br>
    </p>
    <p>
    <div style="display: flex; gap: 10px; justify-content: center;">

    </p>
      
</body>
</html>
