<!DOCTYPE html>
<html lang="zh-Hant">
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>七夕收涎儀式流程</title>
    <style>
        body {
            background-image: url('web工作區域 1.png'); 
            background-size: 100% auto;
            background-attachment: scroll;
            background-position: center top;
            background-repeat: no-repeat;
            min-height: 100vh;
            background-color: #a24731;
            margin: 0;
            padding: 20px;
        } /* 修正原本遺漏的閉合括號 */

        /* 設定標題顏色與大小 */
        h1 {
            text-align: center;
            color: #e99e9d;
            font-size: 60px;
        }

        /* 設定段落文字大小 */
        p {
            text-align: left;
            font-size: 25px;
            line-height: 1.6;
            color: #ffffff;
        }

        /* 設定圖片樣式 */
        img {
            border-radius: 15px;
            margin-top: 20px;
        }

        /* ==================== 
           新增：漸漸上浮的動畫設定 
           ==================== */
        .fade-in-element {
            opacity: 0; /* 預設隱藏 */
            transform: translateY(40px); /* 預設向下位移 40px */
            transition: opacity 0.8s ease-out, transform 0.8s ease-out; /* 動態過渡效果 */
            will-change: opacity, transform;
        }

        /* 當元素進入畫面時，觸發這個 Class */
        .fade-in-element.is-visible {
            opacity: 1; /* 恢復透明度 */
            transform: translateY(0); /* 回到原本位置 */
        }
    </style>
</head>
<body>

   <div class="content">
    <h1>七夕收涎儀式流程</h1>
    
    <!-- 將需要上浮出現的內容加上 fade-in-element 類別 -->
    <div class="fade-in-element">
        <p>1.準備祭拜織女的供桌跟七夕粿。</p>
        <div style="display: flex; gap: 10px; justify-content: center;">
            <img src="web1.png" style="width: 50%">
            <img src="web2.png" style="width: 50%">
    <p>
2.讓小孩的雙腳跨在戶碇兩旁。<br>
    <div style="display: flex; gap: 10px; justify-content: center;">
    <img src="web3.png" style="width: 50%"></div><br>
    </p>
    <p>
3.用七夕粿擦嘴。<br>
    <div style="display: flex; gap: 10px; justify-content: center;">
    <img src="web4.png" style="width: 50%"></div><br>
    </p>
    <p>
4.讓小孩咬一小口七夕粿吐在地上，家長唸：「丟一口粿，死後入土，乎六畜吞入肚，保我兒孫無事故。」<br>
    <div style="display: flex; gap: 10px; justify-content: center;">
    <img src="web5.png" style="width: 50%"></div><br>
    </p>
    <p>
5.祭拜完後焚燒金紙，將胭脂置於屋頂或牆角，給織女打扮使用<br>
    <div style="display: flex; gap: 10px; justify-content: center;">
    <img src="web5.png" style="width: 50%"></div><br>
    </p>
    <p>
    <div style="display: flex; gap: 10px; justify-content: center;">
    <img src="webb.png" style="width: 100%"></div><br>
    </p>
<script>
        document.addEventListener("DOMContentLoaded", function() {
            // 建立偵測器
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    // 當元素有 10% 進入畫面時就觸發
                    if (entry.isIntersecting) {
                        entry.target.classList.add('is-visible');
                        // 如果希望往上滾動時重新隱藏，可以把下面這行註解拿掉
                        // observer.unobserve(entry.target); 
                    }
                });
            }, {
                threshold: 0.1 // 觸發機率設定
            });

            // 尋找所有需要動畫的元素並綁定
            const elements = document.querySelectorAll('.fade-in-element');
            elements.forEach(el => observer.observe(el));
        });           
</body>
</html>
