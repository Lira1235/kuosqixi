<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kuosqixi</title>
  <style>
    /* ─── 基礎版面重設 ─── */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #000;
      color: #fff;
      overflow-x: hidden;
    }

    /* ─── 頂部主視覺區 ─── */
    .hero-section {
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #111;
    }
    .hero-image {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    /* ─── 滾動容器與黏性定位架構 ─── */
    .scroll-container {
      position: relative;
      width: 100%;
      /* 依據步驟長度微調高度，控制滾動速度 */
      height: 380vh; 
    }
    .step2-scroll-container {
      position: relative;
      width: 100%;
      height: 380vh; 
    }
    .step3-scroll-container {
      position: relative;
      width: 100%;
      height: 380vh; 
    }

    .sticky-frame {
      position: sticky;
      top: 0;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* ─── 圖片群組與定位 ─── */
    .images-group {
      position: relative;
      width: 100%;
      height: 100vh;
      will-change: transform;
    }

    /* 讓所有步驟的圖片預設都重疊在同一個畫面的中心頂部，並微幅下偏 40px */
    .step-item {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start; /* 頂部對齊 */
      opacity: 0;
      transform: translate3d(0, 40px, 0);
      will-change: transform, opacity;
    }

    .step-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    /* ─── 頁尾區 ─── */
    .footer-section {
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #111;
      font-size: 24px;
    }
  </style>
</head>
<body>

  <!-- 1. 頂部主視覺區 -->
  <section class="hero-section">
    <img src="webb.png" alt="Webb Main" class="hero-image">
  </section>

  <!-- ========================================== -->
  <!-- 2. 步驟一 滾動控制軌道 (圖片 1 ~ 7) -->
  <!-- ========================================== -->
  <div class="scroll-container step1-scroll-container">
    <div class="sticky-frame step1-sticky-frame">
      <div class="images-group step1-images-group">
        <div class="step-item step-1"><img class="step-img" src="工作區域 1.png" alt="Step 1"></div>
        <div class="step-item step-2"><img class="step-img" src="工作區域 2.png" alt="Step 2"></div>
        <div class="step-item step-3"><img class="step-img" src="工作區域 3.png" alt="Step 3"></div>
        <div class="step-item step-4"><img class="step-img" src="工作區域 4.png" alt="Step 4"></div>
        <div class="step-item step-5"><img class="step-img" src="工作區域 5.png" alt="Step 5"></div>
        <div class="step-item step-6"><img class="step-img" src="工作區域 6.png" alt="Step 6"></div>
        <div class="step-item step-7"><img class="step-img" src="工作區域 7.png" alt="Step 7"></div>
      </div>
    </div>
  </div>

  <!-- ========================================== -->
  <!-- 3. 步驟二 滾動控制軌道 (圖片 13, 12, 10, 14, 9, 11) -->
  <!-- ========================================== -->
  <div class="step2-scroll-container">
    <div class="sticky-frame step2-sticky-frame">
      <!-- 移除原本對齊底部的 CSS 類別，直接沿用 images-group 與 step-item 預設樣式 -->
      <div class="images-group step2-images-group">
        <div class="step-item step-13"><img class="step-img" src="工作區域 13.png" alt="Step 13"></div>
        <div class="step-item step-12"><img class="step-img" src="工作區域 12.png" alt="Step 12"></div>
        <div class="step-item step-10"><img class="step-img" src="工作區域 10.png" alt="Step 10"></div>
        <div class="step-item step-14"><img class="step-img" src="工作區域 14.png" alt="Step 14"></div>
        <div class="step-item step-9"><img class="step-img" src="工作區域 9.png" alt="Step 9"></div>
        <div class="step-item step-11"><img class="step-img" src="工作區域 11.png" alt="Step 11"></div>
      </div>
    </div>
  </div>

  <!-- 4. 頁尾區 -->
  <section class="footer-section">
    <p>網頁內容結束</p>
  </section>

  <script>
    // ─── 線性插值計算輔助函數 ───
    function getInterpolatedValue(progress, start, end, fromVal, toVal) {
      if (progress <= start) return fromVal;
      if (progress >= end) return toVal;
      const ratio = (progress - start) / (end - start);
      return fromVal + (toVal - fromVal) * ratio;
    }

    let isTicking = false;

    // ─── 滾動效果核心渲染邏輯 ───
    function updateScrollEffects() {
      // =======================================================
      // 【步驟一滾動控制軌道】
      // =======================================================
      const container1 = document.querySelector('.step1-scroll-container');
      const stickyFrame1 = document.querySelector('.step1-sticky-frame');
      const imagesGroup1 = document.querySelector('.step1-images-group');
      const img1 = document.querySelector('.step-1');
      const img2 = document.querySelector('.step-2');
      const img3 = document.querySelector('.step-3');
      const img4 = document.querySelector('.step-4');
      const img5 = document.querySelector('.step-5');
      const img6 = document.querySelector('.step-6');
      const img7 = document.querySelector('.step-7');

      if (container1 && stickyFrame1) {
        const rect1 = container1.getBoundingClientRect();
        const scrollableHeight1 = rect1.height - window.innerHeight;
        let progress1 = -rect1.top / scrollableHeight1;
        progress1 = Math.max(0, Math.min(1, progress1));

        // 階段一：工作區域 1
        const img1Opacity = getInterpolatedValue(progress1, 0.05, 0.15, 0, 1);
        const img1Y = getInterpolatedValue(progress1, 0.05, 0.15, 40, 0);
        if (img1) {
          img1.style.opacity = img1Opacity;
          img1.style.transform = `translate3d(0, ${img1Y}px, 0)`;
        }

        // 階段二：工作區域 2
        const img2Opacity = getInterpolatedValue(progress1, 0.12, 0.22, 0, 1);
        const img2Y = getInterpolatedValue(progress1, 0.12, 0.22, 40, 0);
        if (img2) {
          img2.style.opacity = img2Opacity;
          img2.style.transform = `translate3d(0, ${img2Y}px, 0)`;
        }

        // 階段三：工作區域 3
        const img3Opacity = getInterpolatedValue(progress1, 0.18, 0.28, 0, 1);
        const img3Y = getInterpolatedValue(progress1, 0.18, 0.28, 40, 0);
        if (img3) {
          img3.style.opacity = img3Opacity;
          img3.style.transform = `translate3d(0, ${img3Y}px, 0)`;
        }

        // 階段四：工作區域 4
        const img4Opacity = getInterpolatedValue(progress1, 0.24, 0.34, 0, 1);
        const img4Y = getInterpolatedValue(progress1, 0.24, 0.34, 40, 0);
        if (img4) {
          img4.style.opacity = img4Opacity;
          img4.style.transform = `translate3d(0, ${img4Y}px, 0)`;
        }

        // 階段五：工作區域 5
        const img5Opacity = getInterpolatedValue(progress1, 0.30, 0.40, 0, 1);
        const img5Y = getInterpolatedValue(progress1, 0.30, 0.40, 40, 0);
        if (img5) {
          img5.style.opacity = img5Opacity;
          img5.style.transform = `translate3d(0, ${img5Y}px, 0)`;
        }

        // 階段六：工作區域 6 (偏移動畫微調為 20px)
        const img6Opacity = getInterpolatedValue(progress1, 0.36, 0.46, 0, 1);
        const img6Y = getInterpolatedValue(progress1, 0.36, 0.46, 20, 0);
        if (img6) {
          img6.style.opacity = img6Opacity;
          img6.style.transform = `translate3d(0, ${img6Y}px, 0)`;
        }

        // 階段七：工作區域 7 (偏移動畫微調為 20px)
        const img7Opacity = getInterpolatedValue(progress1, 0.42, 0.52, 0, 1);
        const img7Y = getInterpolatedValue(progress1, 0.42, 0.52, 20, 0);
        if (img7) {
          img7.style.opacity = img7Opacity;
          img7.style.transform = `translate3d(0, ${img7Y}px, 0)`;
        }

        // 階段八：整個步驟一群組一同向上自然滑出視區
        const groupTranslateY1 = getInterpolatedValue(progress1, 0.60, 0.85, 0, -100);
        if (imagesGroup1) {
          imagesGroup1.style.transform = `translate3d(0, ${groupTranslateY1}vh, 0)`;
        }

        stickyFrame1.style.transform = 'translate3d(0, 0, 0)';
      }

      // =======================================================
      // 【步驟二滾動控制軌道】
      // =======================================================
      const container2 = document.querySelector('.step2-scroll-container');
      const stickyFrame2 = document.querySelector('.step2-sticky-frame');
      const imagesGroup2 = document.querySelector('.step2-images-group');
      const img13 = document.querySelector('.step-13');
      const img12 = document.querySelector('.step-12');
      const img10 = document.querySelector('.step-10');
      const img14 = document.querySelector('.step-14');
      const img9 = document.querySelector('.step-9');
      const img11 = document.querySelector('.step-11');

      if (container2 && stickyFrame2) {
        const rect2 = container2.getBoundingClientRect();
        const scrollableHeight2 = rect2.height - window.innerHeight;
        let progress2 = -rect2.top / scrollableHeight2;
        progress2 = Math.max(0, Math.min(1, progress2));

        // 階段一：工作區域 13 (最底層先顯現，從 40px 微幅滑入)
        const img13Opacity = getInterpolatedValue(progress2, 0.05, 0.15, 0, 1);
        const img13Y = getInterpolatedValue(progress2, 0.05, 0.15, 40, 0);
        if (img13) {
          img13.style.opacity = img13Opacity;
          img13.style.transform = `translate3d(0, ${img13Y}px, 0)`;
        }

        // 階段二：工作區域 12 (重疊滑入)
        const img12Opacity = getInterpolatedValue(progress2, 0.12, 0.24, 0, 1);
        const img12Y = getInterpolatedValue(progress2, 0.12, 0.24, 40, 0);
        if (img12) {
          img12.style.opacity = img12Opacity;
          img12.style.transform = `translate3d(0, ${img12Y}px, 0)`;
        }

        // 階段三：工作區域 10 (重疊滑入)
        const img10Opacity = getInterpolatedValue(progress2, 0.20, 0.32, 0, 1);
        const img10Y = getInterpolatedValue(progress2, 0.20, 0.32, 40, 0);
        if (img10) {
          img10.style.opacity = img10Opacity;
          img10.style.transform = `translate3d(0, ${img10Y}px, 0)`;
        }

        // 階段四：工作區域 14 (重疊滑入)
        const img14Opacity = getInterpolatedValue(progress2, 0.28, 0.40, 0, 1);
        const img14Y = getInterpolatedValue(progress2, 0.28, 0.40, 40, 0);
        if (img14) {
          img14.style.opacity = img14Opacity;
          img14.style.transform = `translate3d(0, ${img14Y}px, 0)`;
        }

        // 階段五：工作區域 9 (微調為 20px 偏移動畫，比照步驟一後段)
        const img9Opacity = getInterpolatedValue(progress2, 0.36, 0.48, 0, 1);
        const img9Y = getInterpolatedValue(progress2, 0.36, 0.48, 20, 0);
        if (img9) {
          img9.style.opacity = img9Opacity;
          img9.style.transform = `translate3d(0, ${img9Y}px, 0)`;
        }

        // 階段六：工作區域 11 (微調為 20px 偏移動畫，比照步驟一後段)
        const img11Opacity = getInterpolatedValue(progress2, 0.42, 0.54, 0, 1);
        const img11Y = getInterpolatedValue(progress2, 0.42, 0.54, 20, 0);
        if (img11) {
          img11.style.opacity = img11Opacity;
          img11.style.transform = `translate3d(0, ${img11Y}px, 0)`;
        }

        // 階段七：整個步驟二群組（包含所有重疊好的圖片）一同向上自然滑出視區 (0.60 ~ 0.85)
        const groupTranslateY2 = getInterpolatedValue(progress2, 0.60, 0.85, 0, -100);
        if (imagesGroup2) {
          imagesGroup2.style.transform = `translate3d(0, ${groupTranslateY2}vh, 0)`;
        }

        stickyFrame2.style.transform = 'translate3d(0, 0, 0)';
      }

      isTicking = false;
    }

    // 使用 requestAnimationFrame 進行滾動物理節流，消除抖動與卡頓
    function onScroll() {
      if (!isTicking) {
        window.requestAnimationFrame(updateScrollEffects);
        isTicking = true;
      }
    }

    // 監聽滾動事件，使用 passive: true 提升行動裝置的滑動響應速度
    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('DOMContentLoaded', updateScrollEffects);
  </script>
</body>
</html>
