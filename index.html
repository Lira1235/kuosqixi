<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>七夕收涎儀式流程</title>
    <style>
        /* 移除預設邊距，確保圖片 100% 滿版 */
        body {
            background-image: url('web工作區域 1.png');
            background-size: 100% auto;
            background-attachment: scroll;
            background-position: center top;
            background-repeat: no-repeat;
            min-height: 100vh;
            background-color: #a24731;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            overflow-x: hidden;
        }

        /* ─── 標題區優化 ─── */
        /* 改用 absolute 放在滾動容器頂部，讓它隨瀏覽器原生滾動自然上移，零卡頓！ */
        .title-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            box-sizing: border-box;
            padding: 0 20px;
            position: absolute; 
            top: 0;
            left: 0;
            z-index: 20; 
            background-color: transparent;
            pointer-events: none; /* 避免阻擋下方滾動 */
            /* 強制啟用 GPU 加速 */
            transform: translate3d(0, 0, 0);
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        h1 {
            text-align: center;
            color: #e99e9d;
            font-size: 8vw; /* 隨螢幕寬度縮放 */
            margin: 0;
            white-space: nowrap; /* 強制在同一列 */
            letter-spacing: 2px;
        }

        @media (min-width: 768px) {
            h1 {
                font-size: 60px;
            }
        }

        /* 內容區塊通用設定 (步驟二、三、四、五) */
        .content-section {
            width: 100%;
            margin-bottom: 60px; /* 每個步驟之間的間距 */
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        /* 段落文字樣式 */
        p {
            text-align: left;
            font-size: 20px;
            line-height: 1.5;
            color: #ffffff;
            margin: 0 0 15px 0;
            padding: 0 15px;
            align-self: flex-start;
        }

        /* 圖片基本設定 */
        img {
            width: 100% !important;
            height: auto;
            display: block;
            box-shadow: none;
            border-radius: 0;
        }

        /* ========================================== 【步驟一】滾動粘性疊加區 CSS ========================================== */
        .step1-scroll-container {
            position: relative;
            height: 500vh; /* 提供足夠的物理滾動距離 */
            width: 100%;
        }

        /* 粘性定位框架 */
        .step1-sticky-frame {
            position: sticky;
            top: 0;
            height: 100vh;
            height: 100dvh;
            width: 100%;
            will-change: transform;
            transform: translate3d(0, 0, 0);
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        /* 步驟一內的每一張圖片容器 */
        .step1-item {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: flex-start;
            opacity: 0; 
            transform: translate3d(0, 80px, 0); 
            pointer-events: none;
            transition: none; 
            /* 預先告訴瀏覽器此圖層會變動，大幅提高渲染效率 */
            will-change: opacity, transform;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .img-wrapper {
            width: 100%;
        }
    </style>
</head>
<body>

    <!-- ─── 步驟一：獨立滾動疊加區 ─── -->
    <div class="step1-scroll-container">
        
        <!-- 標題放入滾動區頂部，達成 100% 順暢的物理隨滑上移 -->
        <div class="title-container">
            <h1>七夕收涎儀式流程</h1>
        </div>

        <div class="step1-sticky-frame">

            <!-- 【階段一：第一次物理顯現】 -->
            <!-- 1. 工作區域 3 -->
            <div class="step1-item step-3" style="z-index: 10;">
                <div class="img-wrapper">
                    <img src="工作區域 3.png">
                </div>
            </div>

            <!-- 2. 工作區域 2 -->
            <div class="step1-item step-2" style="z-index: 5;">
                <div class="img-wrapper">
                    <img src="工作區域 2.png">
                </div>
            </div>

            <!-- 【階段二：下一次物理顯現（5、6 先出）】 -->
            <!-- 3. 工作區域 5 -->
            <div class="step1-item step-5" style="z-index: 9;">
                <div class="img-wrapper">
                    <img src="工作區域 5.png">
                </div>
            </div>

            <!-- 4. 工作區域 6 -->
            <div class="step1-item step-6" style="z-index: 8;">
                <div class="img-wrapper">
                    <img src="工作區域 6.png">
                </div>
            </div>

            <!-- 【階段三：最後物理顯現（1、4 後出）】 -->
            <!-- 5. 工作區域 1 -->
            <div class="step1-item step-1" style="z-index: 7;">
                <div class="img-wrapper">
                    <img src="工作區域 1.png">
                </div>
            </div>

            <!-- 6. 工作區域 4 -->
            <div class="step1-item step-4" style="z-index: 6;">
                <div class="img-wrapper">
                    <img src="工作區域 4.png">
                </div>
            </div>

            <!-- 【階段四：過渡圖疊加在最上方】 -->
            <!-- 7. 工作區域 7 -->
            <div class="step1-item step-7" style="z-index: 12;">
                <div class="img-wrapper">
                    <img src="工作區域 7.png">
                </div>
            </div>

        </div>
    </div>

    <!-- ─── 步驟二及後續內容 ─── -->
    <div class="content-section">
        <p>2.讓小孩的雙腳跨在戶碇兩旁。</p>
        <img src="web3.png">
    </div>

    <div class="content-section">
        <p>3.用七夕粿擦嘴。</p>
        <img src="web4.png">
    </div>

    <div class="content-section">
        <p>4.讓小孩咬一小口七夕粿吐在地上，家長唸：「丟一口粿，死後入土，乎六畜吞入肚，保我兒孫無事故。」</p>
        <img src="web5.png">
    </div>

    <div class="content-section">
        <p>5.祭拜完後焚燒金紙，將胭脂置於屋頂 or 壁角，給織女打扮使用</p>
        <img src="web5.png">
    </div>

    <div class="content-section" style="margin-bottom: 0;">
        <img src="webb.png">
    </div>

    <!-- 滾動偵測 JavaScript (效能優化版) -->
    <script>
        function getInterpolatedValue(progress, start, end, fromVal, toVal) {
            if (progress < start) return fromVal;
            if (progress > end) return toVal;
            return fromVal + (toVal - fromVal) * ((progress - start) / (end - start));
        }

        let isTicking = false;

        function updateScrollEffects() {
            const container = document.querySelector('.step1-scroll-container');
            const stickyFrame = document.querySelector('.step1-sticky-frame');
            
            const img3 = document.querySelector('.step-3');
            const img2 = document.querySelector('.step-2');
            const img5 = document.querySelector('.step-5');
            const img6 = document.querySelector('.step-6');
            const img1 = document.querySelector('.step-1');
            const img4 = document.querySelector('.step-4');
            const img7 = document.querySelector('.step-7');

            if (!container || !stickyFrame) {
                isTicking = false;
                return;
            }

            const rect = container.getBoundingClientRect();
            const scrollableHeight = rect.height - window.innerHeight;
            let progress = -rect.top / scrollableHeight;
            progress = Math.max(0, Math.min(1, progress));

            // =======================================================
            // 標題上移改由 CSS Absolute 天然滾動處理，此處不作任何 JS 計算，大幅釋放 CPU！
            // =======================================================

            // 1. 階段一：工作區域 3 & 工作區域 2 (15% -> 45%)
            const img3Opacity = getInterpolatedValue(progress, 0.15, 0.35, 0, 1);
            const img3Y = getInterpolatedValue(progress, 0.15, 0.35, 80, 0);
            if (img3) {
                img3.style.opacity = img3Opacity;
                img3.style.transform = `translate3d(0, ${img3Y}px, 0)`;
            }

            const img2Opacity = getInterpolatedValue(progress, 0.20, 0.45, 0, 1);
            const img2Y = getInterpolatedValue(progress, 0.20, 0.45, 80, 0);
            if (img2) {
                img2.style.opacity = img2Opacity;
                img2.style.transform = `translate3d(0, ${img2Y}px, 0)`;
            }

            // 2. 階段二：工作區域 5 & 工作區域 6 (35% -> 65%)
            const img5Opacity = getInterpolatedValue(progress, 0.35, 0.55, 0, 1);
            const img5Y = getInterpolatedValue(progress, 0.35, 0.55, 80, 0);
            if (img5) {
                img5.style.opacity = img5Opacity;
                img5.style.transform = `translate3d(0, ${img5Y}px, 0)`;
            }

            const img6Opacity = getInterpolatedValue(progress, 0.40, 0.65, 0, 1);
            const img6Y = getInterpolatedValue(progress, 0.40, 0.65, 80, 0);
            if (img6) {
                img6.style.opacity = img6Opacity;
                img6.style.transform = `translate3d(0, ${img6Y}px, 0)`;
            }

            // 3. 階段三：工作區域 1 & 工作區域 4 (55% -> 85%)
            const img1Opacity = getInterpolatedValue(progress, 0.55, 0.75, 0, 1);
            const img1Y = getInterpolatedValue(progress, 0.55, 0.75, 30, 0);
            if (img1) {
                img1.style.opacity = img1Opacity;
                img1.style.transform = `translate3d(0, ${img1Y}px, 0)`;
            }

            const img4Opacity = getInterpolatedValue(progress, 0.60, 0.85, 0, 1);
            const img4Y = getInterpolatedValue(progress, 0.60, 0.85, 30, 0);
            if (img4) {
                img4.style.opacity = img4Opacity;
                img4.style.transform = `translate3d(0, ${img4Y}px, 0)`;
            }

            // 4. 過渡圖 7 物理淡入 & 整個黏性框移出 (75% -> 100%)
            const img7Opacity = getInterpolatedValue(progress, 0.75, 0.95, 0, 1);
            if (img7) {
                img7.style.opacity = img7Opacity;
            }

            const frameTranslateY = getInterpolatedValue(progress, 0.75, 1.00, 0, -100);
            stickyFrame.style.transform = `translate3d(0, ${frameTranslateY}vh, 0)`;

            // 釋放鎖定
            isTicking = false;
        }

        // 使用 requestAnimationFrame 進行滾動性能節流優化
        function onScroll() {
            if (!isTicking) {
                window.requestAnimationFrame(updateScrollEffects);
                isTicking = true;
            }
        }

        window.addEventListener('scroll', onScroll, { passive: true });
        window.addEventListener('DOMContentLoaded', updateScrollEffects);
    </script>
</body>
</html>
