<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>七夕收涎儀式流程</title>
    <style>
        body {
            /* 1. 設定背景圖片路徑 */
            background-image: url('web工作區域 1.png'); 
            background-size: 100% auto;
            /* 3. 讓背景固定不隨捲軸移動 */
            background-attachment: scroll;
            /* 4. 置中對齊 */
            background-position: center top;
            background-repeat: no-repeat;
            min-height: 100vh;
            background-color: #a24731;
            margin: 0;
            padding: 20px;
        } /* 修正閉合括號 */

        /* 設定標題顏色與大小 */
        h1 {
            text-align: center; /* 讓內容居中 */
            color: #e99e9d;
            font-size: 60px; /* 標題字體大小 */
            margin-bottom: 50px;
        }

        /* 設定段落文字大小 */
        p {
            text-align: left; /* 讓內容靠左 */
            font-size: 25px;
            line-height: 1.6;
            color: #ffffff; /* 文字顏色 */
            margin-bottom: 10px;
        }

        /* 設定圖片樣式 */
        img {
            border-radius: 15px; /* 讓圖片圓角 */
            margin-top: 20px;
        }

        /* ==================== 
           漸漸上浮的 CSS 動畫設定 
           ==================== */
        .fade-in-section {
            opacity: 0; /* 預設隱藏 */
            transform: translateY(50px); /* 預設向下位移 50px */
            transition: opacity 0.8s ease-out, transform 0.8s ease-out; /* 動態過渡時間 */
            margin-bottom: 60px; /* 讓每個步驟之間有舒適的距離 */
            will-change: opacity, transform;
        }

        /* 當滾動到該元素時，由 JavaScript 加上此 Class 觸發動畫 */
        .fade-in-section.is-visible {
            opacity: 1; /* 恢復透明度 */
            transform: translateY(0); /* 回到原位 */
        }
    </style>
</head>
<body>

   <div class="content">
    <h1>七夕收涎儀式流程</h1>
    
    <!-- 步驟 1 -->
    <div class="fade-in-section">
        <p>1.準備祭拜織女的供桌跟七夕粿。</p>
        <div style="display: flex; gap: 10px; justify-content: center;">
            <img src="web1.png" style="width: 50%">
            <img src="web2.png" style="width: 50%">
        </div>
    </div>

    <!-- 步驟 2 -->
    <div class="fade-in-section">
        <p>2.讓小孩的雙腳跨在戶碇兩旁。</p>
        <div style="display: flex; gap: 10px; justify-content: center;">
            <img src="web3.png" style="width: 50%">
        </div>
    </div>

    <!-- 步驟 3 -->
    <div class="fade-in-section">
        <p>3.用七夕粿擦嘴。</p>
        <div style="display: flex; gap: 10px; justify-content: center;">
            <img src="web4.png" style="width: 50%">
        </div>
    </div>

    <!-- 步驟 4 -->
    <div class="fade-in-section">
        <p>4.讓小孩咬一小口七夕粿吐在地上，家長唸：「丟一口粿，死後入土，乎六畜吞入肚，保我兒孫無事故。」</p>
        <div style="display: flex; gap: 10px; justify-content: center;">
            <img src="web5.png" style="width: 50%">
        </div>
    </div>

    <!-- 步驟 5 -->
    <div class="fade-in-section">
        <p>5.祭拜完後焚燒金紙，將胭脂置於屋頂或牆角，給織女打扮使用</p>
        <div style="display: flex; gap: 10px; justify-content: center;">
            <img src="web5.png" style="width: 50%">
        </div>
    </div>

    <!-- 結尾大圖 -->
    <div class="fade-in-section">
        <div style="display: flex; gap: 10px; justify-content: center;">
            <img src="webb.png" style="width: 100%">
        </div>
    </div>
      
   </div> <!-- 補上 content 閉合標籤 -->

    <!-- ==================== 
       控制滾動偵測的 JavaScript 
       ==================== -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // 建立滾動偵測器
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    // 當元素有 15% 進入畫面時就觸發動畫
                    if (entry.isIntersecting) {
                        entry.target.classList.add('is-visible');
                    }
                });
            }, {
                threshold: 0.15 // 觸發靈敏度（0.15 代表元素露出 15% 時觸發）
            });

            // 自動尋找畫面上所有帶有 .fade-in-section 的區塊並開始偵測
            const sections = document.querySelectorAll('.fade-in-section');
            sections.forEach(sec => observer.observe(sec));
        });
    </script>
</body>
</html>
