<!DOCTYPE html>
<html lang="zh-Hant">
<html>
<head>
   
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>製作七夕粿！</title>
    <style>
        body {
            /* 1. 設定背景圖片路徑 */
            background-image: url('web工作區域 1.png'); 
            
            background-size: 100% auto;
           
            
            /* 3. 讓背景固定不隨捲軸移動 */
            background-attachment: scroll;
            
            /* 4. 置中對齊 */
            background-position: center top;
            background-repeat: no-repeat;
            min-height: 100vh;
            background-color: #a24731;

        /* 設定標題顏色與大小 */
        h1 {
            text-align: Center; /* 讓內容居中 */
            color: #e99e9d;
            font-size: 60px; /* 標題字體大小 */
        }

        /* 設定段落文字大小 */
        p {
            text-align: Left; /* 讓內容居中 */
            font-size: 25px;
            line-height: 1.6;
            color: #ffffff; /* 文字顏色 */
        }

        /* 設定圖片樣式 */
        img {
            border-radius: 15px; /* 讓圖片圓角 */
            margin-top: 20px;
        }
    </style>
</head>
<body>

   <div class="content">
    <h1>製作七夕粿！</h1>
    
    <p>
1.準備粉團：糯米粉加水揉成團，搓圓後用手指壓出中心凹洞。<br>
    <div style="display: flex; gap: 10px; justify-content: center;">
    <img src="web1.png" style="width: 50%">
    <img src="web2.png" style="width: 50%"></div><br>
    </p>
    <p>
2.水煮：將粉團放入滾水中煮至浮起。<br>
    <div style="display: flex; gap: 10px; justify-content: center;">
    <img src="web3.png" style="width: 50%"></div><br>
    </p>
    <p>
3.製作糖水：糖（白糖、黑糖皆可）加水煮成糖水。<br>
    <div style="display: flex; gap: 10px; justify-content: center;">
    <img src="web4.png" style="width: 50%"></div><br>
    </p>
    <p>
4.組合：將煮好的糖粿放入碗中，淋上糖水即可，也可加花生碎。
    <div style="display: flex; gap: 10px; justify-content: center;">
    <img src="web5.png" style="width: 50%"></div><br>
    </p>
    <p>
    <div style="display: flex; gap: 10px; justify-content: center;">
    <img src="webb.png" style="width: 100%"></div><br>
    </p>
      
</body>
</html>
