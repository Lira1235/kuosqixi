<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>七夕收涎儀式流程</title>
<style>
/* 移除預設邊距，確保圖片 100% 滿版 */
body {
  background-image: url('web工作區域 1.png');
  background-size: 100% auto;
  background-attachment: scroll;
  background-position: center top;
  background-repeat: no-repeat;
  min-height: 100vh;
  background-color: #a24731;
  margin: 0;
  padding: 0;
  font-family: sans-serif;
  overflow-x: hidden;
}
/* ─── 標題區 ─── */
.title-container {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100%;
  height: 100vh;
  height: 100dvh;
  box-sizing: border-box;
  padding: 0 20px;
  position: absolute;
  top: 0;
  left: 0;
  z-index: 45; /* 確保標題層級最高 */
  background-color: transparent;
  pointer-events: none;
  transform: translate3d(0, 0, 0);
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}
h1 {
  text-align: center;
  color: #e99e9d;
  font-size: 8vw;
  margin: 0;
  white-space: nowrap;
  letter-spacing: 2px;
}
@media (min-width: 768px) {
  h1 { font-size: 60px; }
}
/* 內容區塊通用設定 (步驟四、五) */
.content-section {
  width: 100%;
  margin-bottom: 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  z-index: 50; /* 高於滾動粘性區，隨著自然滾動由下往上推進 */
  background-color: #a24731; /* 設為背景色，確保完全遮擋下方粘性內容 */
}
/* 段落文字樣式 */
p {
  text-align: left;
  font-size: 20px;
  line-height: 1.5;
  color: #ffffff;
  margin: 0 0 15px 0;
  padding: 0 15px;
  align-self: flex-start;
}
/* 圖片基本設定 */
img {
  width: 100% !important;
  height: auto;
  display: block;
  box-shadow: none;
  border-radius: 0;
  transform: translateZ(0); /* 啟用 GPU 渲染加速 */
}
/* ========================================== 通用滾動粘性疊加區 CSS ========================================== */
.step-scroll-container {
  position: relative;
  height: 1000vh; /* 延長至 1000vh，確保步驟一、二、三的疊加擁有完美的手感與流暢度 */
  width: 100%;
}
.step-sticky-frame {
  position: sticky;
  top: 0;
  height: 100vh;
  height: 100dvh;
  width: 100%;
  overflow: hidden;
  will-change: transform;
  transform: translate3d(0, 0, 0);
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}
/* ─── 物理長圖核心 ─── */
/* 總長度為 300vh 的長條畫布容器，步驟一、二、三垂直排列，實現無縫滾動滑動 */
.long-canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 300vh; /* 三倍高度：步驟一(0-100vh)、步驟二(100vh-200vh)、步驟三(200vh-300vh) */
  display: flex;
  flex-direction: column;
  will-change: transform;
  transform: translate3d(0, 0, 0);
}
/* 每一大段步驟組各佔 100vh 高度 */
.step1-images-group,
.step2-images-group,
.step3-images-group {
  position: relative;
  width: 100%;
  height: 100vh;
}
/* 圖片 7 獨立絕對定位包裝器 */
.step-7-wrapper {
  position: absolute;
  top: 100vh; /* 釘在步驟一與二的交接線上 */
  left: 0;
  width: 100%;
  height: 100vh;
  transform: translate3d(0, -35vh, 0); 
  pointer-events: none;
  z-index: 20; 
}
/* 每一張疊加圖片容器 */
.step-item {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: flex-start; /* 對齊頂部 */
  opacity: 0;
  transform: translate3d(0, 40px, 0); /* 初始滑動偏移 */
  pointer-events: none;
  transition: none;
  will-change: transform, opacity;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}
/* 步驟二的所有圖片頂部對齊並疊在各自的畫布上 */
.step2-images-group .step-item {
  align-items: flex-start;
  transform: translate3d(0, 40px, 0);
}
/* 步驟三特別設定：初始位置為上方 -40px，讓它由上往下掉落滑入 */
.step3-images-group .step-item {
  align-items: flex-start;
  transform: translate3d(0, -40px, 0);
}
/* 初始位置維持原位 X:0, Y:0 */
.step3-images-group .step-21 {
  transform: translate3d(0, 0, 0);
}
.img-wrapper { width: 100%; }
</style>
</head>
<body>
<!-- ─── 一體化滾動疊加區（步驟一 + 步驟二 + 步驟三） ─── -->
<div class="step-scroll-container step-main-container">
  <!-- 標題放入滾動區頂部 -->
  <div class="title-container">
    <h1>七夕收涎儀式流程</h1>
  </div>
  <div class="step-sticky-frame step-main-sticky-frame">
    <!-- 長條包裝容器 -->
    <div class="long-canvas">
      
      <!-- 1. 步驟一 圖片群組 (0vh ~ 100vh) -->
      <div class="step-images-group step1-images-group">
        <div class="step-item step-3" style="z-index: 10;">
          <div class="img-wrapper"><img src="工作區域 3.png" decoding="async"></div>
        </div>
        <div class="step-item step-2" style="z-index: 5;">
          <div class="img-wrapper"><img src="工作區域 2.png" decoding="async"></div>
        </div>
        <div class="step-item step-5" style="z-index: 9;">
          <div class="img-wrapper"><img src="工作區域 5.png" decoding="async"></div>
        </div>
        <div class="step-item step-6" style="z-index: 8;">
          <div class="img-wrapper"><img src="工作區域 6.png" decoding="async"></div>
        </div>
        <div class="step-item step-1" style="z-index: 7;">
          <div class="img-wrapper"><img src="工作區域 1.png" decoding="async"></div>
        </div>
        <div class="step-item step-4" style="z-index: 6;">
          <div class="img-wrapper"><img src="工作區域 4.png" decoding="async"></div>
        </div>
      </div>

      <!-- 獨立疊加的圖片 7 -->
      <div class="step-7-wrapper">
        <div class="step-item step-7" style="z-index: 20;">
          <div class="img-wrapper">
            <img src="工作區域 7.png" decoding="async">
          </div>
        </div>
      </div>

      <!-- 2. 步驟二 圖片群組 (100vh ~ 200vh) -->
      <div class="step-images-group step2-images-group">
        <div class="step-item step-13" style="z-index: 14;">
          <div class="img-wrapper"><img src="工作區域 13.png" decoding="async"></div>
        </div>
        <div class="step-item step-12" style="z-index: 15;">
          <div class="img-wrapper"><img src="工作區域 12.png" decoding="async"></div>
        </div>
        <div class="step-item step-10" style="z-index: 12;">
          <div class="img-wrapper"><img src="工作區域 10.png" decoding="async"></div>
        </div>
        <div class="step-item step-14" style="z-index: 11;">
          <div class="img-wrapper"><img src="工作區域 14.png" decoding="async"></div>
        </div>
        <div class="step-item step-11" style="z-index: 13;">
          <div class="img-wrapper"><img src="工作區域 11.png" decoding="async"></div>
        </div>
        <div class="step-item step-9" style="z-index: 10;">
          <div class="img-wrapper"><img src="工作區域 9.png" decoding="async"></div>
        </div>
      </div>

      <!-- 3. 步驟三 圖片群組 (200vh ~ 300vh) -->
      <!-- Z-index 順序（前至後）：21 (28) > 22 (27) > 19 (26) > 17 (25) > 18 (24) > 15 (23) > 20 (22) > 16 (21) -->
      <div class="step-images-group step3-images-group">
        <div class="step-item step-21" style="z-index: 28;">
          <div class="img-wrapper"><img src="工作區域 21.png" decoding="async"></div>
        </div>
        <div class="step-item step-22" style="z-index: 27;">
          <div class="img-wrapper"><img src="工作區域 22.png" decoding="async"></div>
        </div>
        <div class="step-item step-19" style="z-index: 26;">
          <div class="img-wrapper"><img src="工作區域 19.png" decoding="async"></div>
        </div>
        <div class="step-item step-17" style="z-index: 25;">
          <div class="img-wrapper"><img src="工作區域 17.png" decoding="async"></div>
        </div>
        <div class="step-item step-18" style="z-index: 24;">
          <div class="img-wrapper"><img src="工作區域 18.png" decoding="async"></div>
        </div>
        <div class="step-item step-15" style="z-index: 23;">
          <div class="img-wrapper"><img src="工作區域 15.png" decoding="async"></div>
        </div>
        <div class="step-item step-20" style="z-index: 22;">
          <div class="img-wrapper"><img src="工作區域 20.png" decoding="async"></div>
        </div>
        <div class="step-item step-16" style="z-index: 21;">
          <div class="img-wrapper"><img src="工作區域 16.png" decoding="async"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- ─── 步驟四及後續內容 ─── -->
<div class="content-section">
  <p>4.讓小孩咬一小口七夕粿吐在地上，家長唸：「丟一口粿，死後入土，乎六畜吞入肚，保我兒孫無事故。」</p>
  <img src="web5.png" decoding="async" loading="lazy">
</div>
<div class="content-section">
  <p>5.祭拜完後焚燒金紙，將胭脂置於屋頂 or 壁角，給織女打扮使用</p>
  <img src="web5.png" decoding="async" loading="lazy">
</div>
<div class="content-section" style="margin-bottom: 0;">
  <img src="webb.png" decoding="async" loading="lazy">
</div>

<script>
// 物理進度線性內插計算
function getInterpolatedValue(progress, start, end, fromVal, toVal) {
  if (progress < start) return fromVal;
  if (progress > end) return toVal;
  return fromVal + (toVal - fromVal) * ((progress - start) / (end - start));
}
let isTicking = false;
function updateScrollEffects() {
  const container = document.querySelector('.step-main-container');
  const stickyFrame = document.querySelector('.step-main-sticky-frame');
  const titleContainer = document.querySelector('.title-container');
  const longCanvas = document.querySelector('.long-canvas');
  // 步驟一
  const img3 = document.querySelector('.step-3');
  const img2 = document.querySelector('.step-2');
  const img5 = document.querySelector('.step-5');
  const img6 = document.querySelector('.step-6');
  const img1 = document.querySelector('.step-1');
  const img4 = document.querySelector('.step-4');
  // 獨立 7
  const img7 = document.querySelector('.step-7');
  // 步驟二
  const img13 = document.querySelector('.step-13');
  const img12 = document.querySelector('.step-12');
  const img10 = document.querySelector('.step-10');
  const img14 = document.querySelector('.step-14');
  const img9 = document.querySelector('.step-9');
  const img11 = document.querySelector('.step-11');
  // 步驟三
  const img15 = document.querySelector('.step-15');
  const img16 = document.querySelector('.step-16');
  const img17 = document.querySelector('.step-17');
  const img18 = document.querySelector('.step-18');
  const img19 = document.querySelector('.step-19');
  const img20 = document.querySelector('.step-20');
  const img21 = document.querySelector('.step-21');
  const img22 = document.querySelector('.step-22');

  if (container && stickyFrame) {
    const rect = container.getBoundingClientRect();
    const scrollableHeight = rect.height - window.innerHeight;
    let progress = -rect.top / scrollableHeight;
    progress = Math.max(0, Math.min(1, progress));

    // -------------------------------------------------------
    // 0. 標題上滑 (progress: 0.00 ~ 0.06)
    // -------------------------------------------------------
    if (titleContainer) {
      const titleY = getInterpolatedValue(progress, 0.00, 0.06, 0, -100);
      titleContainer.style.transform = `translate3d(0, ${titleY}vh, 0)`;
    }

    // -------------------------------------------------------
    // 1. 步驟一 圖片漸顯 (progress: 0.02 ~ 0.26)
    // -------------------------------------------------------
    const img3Opacity = getInterpolatedValue(progress, 0.02, 0.07, 0, 1);
    const img3Y = getInterpolatedValue(progress, 0.02, 0.07, 40, 0);
    if (img3) { img3.style.opacity = img3Opacity; img3.style.transform = `translate3d(0, ${img3Y}px, 0)`; }

    const img2Opacity = getInterpolatedValue(progress, 0.05, 0.10, 0, 1);
    const img2Y = getInterpolatedValue(progress, 0.05, 0.10, 40, 0);
    if (img2) { img2.style.opacity = img2Opacity; img2.style.transform = `translate3d(0, ${img2Y}px, 0)`; }

    const img5Opacity = getInterpolatedValue(progress, 0.08, 0.13, 0, 1);
    const img5Y = getInterpolatedValue(progress, 0.08, 0.13, 40, 0);
    if (img5) { img5.style.opacity = img5Opacity; img5.style.transform = `translate3d(0, ${img5Y}px, 0)`; }

    const img6Opacity = getInterpolatedValue(progress, 0.11, 0.16, 0, 1);
    const img6Y = getInterpolatedValue(progress, 0.11, 0.16, 40, 0);
    if (img6) { img6.style.opacity = img6Opacity; img6.style.transform = `translate3d(0, ${img6Y}px, 0)`; }

    const img1Opacity = getInterpolatedValue(progress, 0.14, 0.20, 0, 1);
    const img1Y = getInterpolatedValue(progress, 0.14, 0.20, 20, 0);
    if (img1) { img1.style.opacity = img1Opacity; img1.style.transform = `translate3d(0, ${img1Y}px, 0)`; }

    const img4Opacity = getInterpolatedValue(progress, 0.18, 0.24, 0, 1);
    const img4Y = getInterpolatedValue(progress, 0.18, 0.24, 20, 0);
    if (img4) { img4.style.opacity = img4Opacity; img4.style.transform = `translate3d(0, ${img4Y}px, 0)`; }

    // -------------------------------------------------------
    // 2. 【物理長圖無縫推進邏輯】
    // -------------------------------------------------------
    let canvasY = 0;
    if (progress >= 0.26 && progress <= 0.62) {
      canvasY = getInterpolatedValue(progress, 0.26, 0.40, 0, -100);
    } else if (progress > 0.62 && progress <= 0.88) {
      canvasY = getInterpolatedValue(progress, 0.62, 0.76, -100, -200);
    } else if (progress > 0.88) {
      canvasY = getInterpolatedValue(progress, 0.88, 0.98, -200, -300);
    }
    if (longCanvas) {
      longCanvas.style.transform = `translate3d(0, ${canvasY}vh, 0)`;
    }

    // -------------------------------------------------------
    // 3. 獨立圖片 7 漸顯 (0.26 ~ 0.35)
    // -------------------------------------------------------
    const img7Opacity = getInterpolatedValue(progress, 0.26, 0.35, 0, 1);
    const img7Y = getInterpolatedValue(progress, 0.26, 0.35, 40, 0);
    if (img7) { img7.style.opacity = img7Opacity; img7.style.transform = `translate3d(0, ${img7Y}px, 0)`; }

    // -------------------------------------------------------
    // 4. 步驟二圖片依序漸顯疊加 (progress: 0.26 ~ 0.60)
    // -------------------------------------------------------
    const img13Opacity = getInterpolatedValue(progress, 0.26, 0.35, 0, 1);
    const img13Y = getInterpolatedValue(progress, 0.26, 0.35, 40, 0);
    if (img13) { img13.style.opacity = img13Opacity; img13.style.transform = `translate3d(0, ${img13Y}px, 0)`; }

    const img12Opacity = getInterpolatedValue(progress, 0.32, 0.41, 0, 1);
    const img12Y = getInterpolatedValue(progress, 0.32, 0.41, 40, 0);
    if (img12) { img12.style.opacity = img12Opacity; img12.style.transform = `translate3d(0, ${img12Y}px, 0)`; }

    const img10Opacity = getInterpolatedValue(progress, 0.37, 0.46, 0, 1);
    const img10Y = getInterpolatedValue(progress, 0.37, 0.46, 40, 0);
    if (img10) { img10.style.opacity = img10Opacity; img10.style.transform = `translate3d(0, ${img10Y}px, 0)`; }

    const img14Opacity = getInterpolatedValue(progress, 0.42, 0.51, 0, 1);
    const img14Y = getInterpolatedValue(progress, 0.42, 0.51, 40, 0);
    if (img14) { img14.style.opacity = img14Opacity; img14.style.transform = `translate3d(0, ${img14Y}px, 0)`; }

    // 9 & 11 同步登場
    const img9And11Opacity = getInterpolatedValue(progress, 0.47, 0.58, 0, 1);
    const img9And11Y = getInterpolatedValue(progress, 0.47, 0.58, 20, 0);
    if (img9) { img9.style.opacity = img9And11Opacity; img9.style.transform = `translate3d(0, ${img9And11Y}px, 0)`; }
    if (img11) { img11.style.opacity = img9And11Opacity; img11.style.transform = `translate3d(0, ${img9And11Y}px, 0)`; }

    // -------------------------------------------------------
    // 5. 步驟三圖片依序漸顯疊加 (progress: 0.62 ~ 0.88)
    // -------------------------------------------------------
    // (1) 工作區域 17
    const img17Opacity = getInterpolatedValue(progress, 0.62, 0.67, 0, 1);
    const img17Y = getInterpolatedValue(progress, 0.62, 0.67, -40, 0);
    if (img17) { img17.style.opacity = img17Opacity; img17.style.transform = `translate3d(0, ${img17Y}px, 0)`; }

    // (2) 工作區域 18
    const img18Opacity = getInterpolatedValue(progress, 0.63, 0.68, 0, 1);
    const img18Y = getInterpolatedValue(progress, 0.63, 0.68, -40, 0);
    if (img18) { img18.style.opacity = img18Opacity; img18.style.transform = `translate3d(0, ${img18Y}px, 0)`; }

    // (3) 工作區域 15
    const img15Opacity = getInterpolatedValue(progress, 0.64, 0.69, 0, 1);
    const img15Y = getInterpolatedValue(progress, 0.64, 0.69, -40, 0);
    if (img15) { img15.style.opacity = img15Opacity; img15.style.transform = `translate3d(0, ${img15Y}px, 0)`; }

    // (4) 工作區域 20
    const img20Opacity = getInterpolatedValue(progress, 0.65, 0.70, 0, 1);
    const img20Y = getInterpolatedValue(progress, 0.65, 0.70, -40, 0);
    if (img20) { img20.style.opacity = img20Opacity; img20.style.transform = `translate3d(0, ${img20Y}px, 0)`; }

    // (5) 工作區域 22
    const img22Opacity = getInterpolatedValue(progress, 0.69, 0.75, 0, 1);
    const img22Y = getInterpolatedValue(progress, 0.69, 0.75, -40, 0);
    if (img22) { img22.style.opacity = img22Opacity; img22.style.transform = `translate3d(0, ${img22Y}px, 0)`; }

    // (6) 工作區域 16
    const img16Opacity = getInterpolatedValue(progress, 0.73, 0.79, 0, 1);
    const img16Y = getInterpolatedValue(progress, 0.73, 0.79, -40, 0);
    if (img16) { img16.style.opacity = img16Opacity; img16.style.transform = `translate3d(0, ${img16Y}px, 0)`; }

    // (7) 工作區域 19
    const img19Opacity = getInterpolatedValue(progress, 0.78, 0.84, 0, 1);
    const img19Y = getInterpolatedValue(progress, 0.78, 0.84, -20, 0);
    if (img19) { img19.style.opacity = img19Opacity; img19.style.transform = `translate3d(0, ${img19Y}px, 0)`; }

    // ───【核心修正點：高度維持 0，橫移距離加大至更顯眼的 20px】───
    // (8) 工作區域 21 - 從 0 移動到 20px
    const img21Opacity = getInterpolatedValue(progress, 0.82, 0.84, 0, 1);
    const img21X = getInterpolatedValue(progress, 0.82, 0.84, 0, 20);
    if (img21) { 
      img21.style.opacity = img21Opacity; 
      img21.style.transform = `translate3d(${img21X}px, 0, 0)`; 
    }

    stickyFrame.style.transform = 'translate3d(0, 0, 0)';
  }
  isTicking = false;
}
// 使用 requestAnimationFrame 進行滾動物理節流，消除抖動與卡頓
function onScroll() {
  if (!isTicking) {
    window.requestAnimationFrame(updateScrollEffects);
    isTicking = true;
  }
}
// 監聽滾動事件
window.addEventListener('scroll', onScroll, { passive: true });
window.addEventListener('DOMContentLoaded', updateScrollEffects);
</script>
</body>
</html>
