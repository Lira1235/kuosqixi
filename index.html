<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>七夕收涎儀式流程</title>
    <style>
        /* 移除預設邊距，確保圖片 100% 滿版 */
        body {
            background-image: url('web工作區域 1.png');
            background-size: 100% auto;
            background-attachment: scroll;
            background-position: center top;
            background-repeat: no-repeat;
            min-height: 100vh;
            background-color: #a24731;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            overflow-x: hidden;
        }

        /* 標題樣式：強制在同一列 */
        h1 {
            text-align: center;
            color: #e99e9d;
            font-size: 8vw;
            margin-top: 30px;
            margin-bottom: 20px;
            white-space: nowrap;
            letter-spacing: 2px;
            padding: 0 10px;
        }

        @media (min-width: 768px) {
            h1 { font-size: 50px; }
        }

        /* 內容區塊通用設定 (步驟二、三、四、五) */
        .content-section {
            width: 100%;
            margin-bottom: 60px; /* 每個步驟之間的間距 */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 段落文字樣式 */
        p {
            text-align: left;
            font-size: 20px;
            line-height: 1.5;
            color: #ffffff;
            margin: 0 0 15px 0;
            padding: 0 15px;
            align-self: flex-start;
        }

        /* 圖片基本設定：完全貼合螢幕寬度，無圓角無陰影 */
        img {
            width: 100% !important;
            height: auto;
            display: block;
            box-shadow: none;
            border-radius: 0;
        }

        /* ==========================================
           【步驟一】滾動粘性疊加區 CSS (控制前後與延遲)
        ========================================== */
        
        /* 步驟一專屬滾動容器：高度越長，6張圖疊加的過程越慢 */
        .step1-scroll-container {
            position: relative;
            height: 400vh; 
            width: 100%;
        }

        /* 粘性定位框架 */
        .step1-sticky-frame {
            position: sticky;
            top: 0;
            height: 100vh;
            width: 100%;
        }

        /* 步驟一內的每一張圖片容器 */
        .step1-item {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: flex-start;
            
            /* 預設隱藏 */
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease-out;
            will-change: opacity;
        }

        /* 啟動時顯示 */
        .step1-item.active {
            opacity: 1;
            pointer-events: auto;
        }

        .img-wrapper {
            width: 100%;
        }
    </style>
</head>
<body>

    <!-- 網頁標題 -->
    <h1>七夕收涎儀式流程</h1>

    <!-- ─── 步驟一：獨立滾動疊加區 ─── -->
    <div class="step1-scroll-container">
        <div class="step1-sticky-frame">
            
            <!-- 1. 工作區域 3 
                 出現順序：第 1 位
                 疊加順序：最上層（z-index: 10） -->
            <div class="step1-item" style="z-index: 10;">
                <div class="img-wrapper">
                    <img src="工作區域 3.png">
                </div>
            </div>

            <!-- 2. 工作區域 2 
                 出現順序：第 2 位（相差 0.02s）
                 疊加順序：最底層（z-index: 5） -->
            <div class="step1-item" style="transition-delay: 0.02s; z-index: 5;">
                <div class="img-wrapper">
                    <img src="工作區域 2.png">
                </div>
            </div>

            <!-- 3. 工作區域 5 
                 出現順序：第 3 位（相差 0.04s）
                 疊加順序：第二層（z-index: 9） -->
            <div class="step1-item" style="transition-delay: 0.04s; z-index: 9;">
                <div class="img-wrapper">
                    <img src="工作區域 5.png">
                </div>
            </div>

            <!-- 4. 工作區域 6 
                 出現順序：第 4 位（相差 0.05s）
                 疊加順序：第三層（z-index: 8） -->
            <div class="step1-item" style="transition-delay: 0.05s; z-index: 8;">
                <div class="img-wrapper">
                    <img src="工作區域 6.png">
                </div>
            </div>

            <!-- 5. 工作區域 1 
                 出現順序：第 5 位（相差 0.06s）
                 疊加順序：第四層（z-index: 7） -->
            <div class="step1-item" style="transition-delay: 0.06s; z-index: 7;">
                <div class="img-wrapper">
                    <img src="工作區域 1.png">
                </div>
            </div>

            <!-- 6. 工作區域 4 
                 出現順序：第 6 位（相差 0.07s）
                 疊加順序：第五層（z-index: 6） -->
            <div class="step1-item" style="transition-delay: 0.07s; z-index: 6;">
                <div class="img-wrapper">
                    <img src="工作區域 4.png">
                </div>
            </div>

        </div>
    </div>


    <!-- ─── 步驟二及後續內容：自然往上滑出 ─── -->
    
    <!-- 步驟 2 -->
    <div class="content-section">
        <p>2.讓小孩的雙腳跨在戶碇兩旁。</p>
        <img src="web3.png">
    </div>

    <!-- 步驟 3 -->
    <div class="content-section">
        <p>3.用七夕粿擦嘴。</p>
        <img src="web4.png">
    </div>

    <!-- 步驟 4 -->
    <div class="content-section">
        <p>4.讓小孩咬一小口七夕粿吐在地上，家長唸：「丟一口粿，死後入土，乎六畜吞入肚，保我兒孫無事故。」</p>
        <img src="web5.png">
    </div>

    <!-- 步驟 5 -->
    <div class="content-section">
        <p>5.祭拜完後焚燒金紙，將胭脂置於屋頂或牆角，給織女打扮使用</p>
        <img src="web5.png">
    </div>

    <!-- 結尾大圖 -->
    <div class="content-section" style="margin-bottom: 0;">
        <img src="webb.png">
    </div>


    <!-- 滾動偵測 JavaScript -->
    <script>
        window.addEventListener('scroll', () => {
            const container = document.querySelector('.step1-scroll-container');
            const steps = document.querySelectorAll('.step1-item');
            
            if (!container || steps.length === 0) return;

            // 取得步驟一容器相對於視窗的座標
            const rect = container.getBoundingClientRect();
            
            // 可滾動總高度
            const scrollableHeight = rect.height - window.innerHeight;
            
            // 計算步驟一滾動進度 (0 ~ 1)
            let progress = -rect.top / scrollableHeight;
            progress = Math.max(0, Math.min(1, progress)); 

            const stepCount = steps.length;

            steps.forEach((step, index) => {
                const threshold = index / stepCount;

                // 只要目前的滾動進度大於等於該步驟的門檻就顯示（active）
                if (progress >= threshold) {
                    step.classList.add('active');
                } else {
                    step.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
