<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>七夕收涎儀式流程</title>
    <style>
        /* 移除預設邊距，確保圖片 100% 滿版 */
        body {
            background-image: url('web工作區域 1.png');
            background-size: 100% auto;
            background-attachment: scroll;
            background-position: center top;
            background-repeat: no-repeat;
            min-height: 100vh;
            background-color: #a24731;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            overflow-x: hidden;
        }

        /* 標題區塊：剛進網頁時滿版（100vh），只有文字，完全無圖片 */
        .title-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            box-sizing: border-box;
            padding: 0 20px;
            position: relative;
            z-index: 20; /* 確保在最上層覆蓋圖片 */
            background-color: transparent; /* 保持背景圖看得到 */
        }

        h1 {
            text-align: center;
            color: #e99e9d;
            font-size: 8vw; /* 隨螢幕寬度縮放 */
            margin: 0;
            white-space: nowrap; /* 強制在同一列 */
            letter-spacing: 2px;
        }

        @media (min-width: 768px) {
            h1 { font-size: 60px; }
        }

        /* 內容區塊通用設定 (步驟二、三、四、五) */
        .content-section {
            width: 100%;
            margin-bottom: 60px; /* 每個步驟之間的間距 */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 段落文字樣式 */
        p {
            text-align: left;
            font-size: 20px;
            line-height: 1.5;
            color: #ffffff;
            margin: 0 0 15px 0;
            padding: 0 15px;
            align-self: flex-start;
        }

        /* 圖片基本設定：完全貼合螢幕寬度，無圓角無陰影 */
        img {
            width: 100% !important;
            height: auto;
            display: block;
            box-shadow: none;
            border-radius: 0;
        }

        /* ==========================================
           【步驟一】滾動粘性疊加區 CSS
        ========================================== */
        
        /* 步驟一專屬滾動容器 */
        .step1-scroll-container {
            position: relative;
            height: 450vh; 
            width: 100%;
            margin-top: -100vh; /* 與標題重合定位，達到無縫滾動效果 */
        }

        /* 粘性定位框架：完全貼合手機螢幕 */
        .step1-sticky-frame {
            position: sticky;
            top: 0;
            height: 100vh;
            height: 100dvh;
            width: 100%;
        }

        /* 步驟一內的每一張圖片容器 */
        .step1-item {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: flex-start;
            
            /* 預設完全隱藏 */
            opacity: 0;
            transform: translate3d(0, 80px, 0); 
            pointer-events: none;
            
            /* 配合 0.01 秒的極小間隔，將漸顯過渡調至更流暢緊湊的 0.8s */
            transition: opacity 0.8s cubic-bezier(0.22, 1, 0.36, 1), transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
            
            will-change: opacity, transform;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        /* 啟動時顯示，並流暢往上滑動回到原位 */
        .step1-item.active {
            opacity: 1;
            transform: translate3d(0, 0, 0);
            pointer-events: auto;
        }

        .img-wrapper {
            width: 100%;
        }
    </style>
</head>
<body>

    <!-- ─── 標題區 ─── -->
    <div class="title-container">
        <h1>七夕收涎儀式流程</h1>
    </div>

    <!-- ─── 步驟一：獨立滾動疊加區 ─── -->
    <div class="step1-scroll-container">
        <div class="step1-sticky-frame">
            
            <!-- 【階段一：第一次滑動顯現】 -->
            <!-- 1. 工作區域 3 
                 出現順序：第一階段（最先，延遲 0s）
                 疊加順序：最上層 (z-index: 10) -->
            <div class="step1-item step-group-1" style="z-index: 10;">
                <div class="img-wrapper">
                    <img src="工作區域 3.png">
                </div>
            </div>

            <!-- 2. 工作區域 2 
                 出現順序：第一階段（與 3 相差 0.02s，維持原設定）
                 疊加順序：最底層 (z-index: 5) -->
            <div class="step1-item step-group-1" style="transition-delay: 0.02s; z-index: 5;">
                <div class="img-wrapper">
                    <img src="工作區域 2.png">
                </div>
            </div>


            <!-- 【階段二：下一次滑動顯現（5、6 先出）】 -->
            <!-- 3. 工作區域 5 
                 出現順序：第二階段（最先，延遲 0s）
                 疊加順序：第二層 (z-index: 9) -->
            <div class="step1-item step-group-2-A" style="z-index: 9;">
                <div class="img-wrapper">
                    <img src="工作區域 5.png">
                </div>
            </div>

            <!-- 4. 工作區域 6 
                 出現順序：第二階段（與 5 相差 0.03s，維持原設定）
                 疊加順序：第三層 (z-index: 8) -->
            <div class="step1-item step-group-2-A" style="transition-delay: 0.03s; z-index: 8;">
                <div class="img-wrapper">
                    <img src="工作區域 6.png">
                </div>
            </div>


            <!-- 【階段三：增加滑動間隔後，最後顯現（1、4 後出）】 -->
            <!-- 5. 工作區域 1 
                 出現順序：第三階段（延遲縮短為 0.01s）
                 疊加順序：第四層 (z-index: 7) -->
            <div class="step1-item step-group-2-B" style="transition-delay: 0.01s; z-index: 7;">
                <div class="img-wrapper">
                    <img src="工作區域 1.png">
                </div>
            </div>

            <!-- 6. 工作區域 4 
                 出現順序：第三階段（延遲縮短為 0.01s）
                 疊加順序：第五層 (z-index: 6) -->
            <div class="step1-item step-group-2-B" style="transition-delay: 0.01s; z-index: 6;">
                <div class="img-wrapper">
                    <img src="工作區域 4.png">
                </div>
            </div>


            <!-- 【階段四：過渡圖疊加在最上方，覆蓋步驟一所有圖】 -->
            <!-- 7. 工作區域 7 
                 出現順序：第四階段（最遲出現，作為畫面過渡）
                 疊加順序：最上層覆蓋 (z-index: 12) -->
            <div class="step1-item step-group-transit" style="z-index: 12;">
                <div class="img-wrapper">
                    <img src="工作區域 7.png">
                </div>
            </div>

        </div>
    </div>


    <!-- ─── 步驟二及後續內容 ─── -->
    
    <!-- 步驟 2 -->
    <div class="content-section">
        <p>2.讓小孩的雙腳跨在戶碇兩旁。</p>
        <img src="web3.png">
    </div>

    <!-- 步驟 3 -->
    <div class="content-section">
        <p>3.用七夕粿擦嘴。</p>
        <img src="web4.png">
    </div>

    <!-- 步驟 4 -->
    <div class="content-section">
        <p>4.讓小孩咬一小口七夕粿吐在地上，家長唸：「丟一口粿，死後入土，乎六畜吞入肚，保我兒孫無事故。」</p>
        <img src="web5.png">
    </div>

    <!-- 步驟 5 -->
    <div class="content-section">
        <p>5.祭拜完後焚燒金紙，將胭脂置於屋頂 or 壁角，給織女打扮使用</p>
        <img src="web5.png">
    </div>

    <!-- 結尾大圖 -->
    <div class="content-section" style="margin-bottom: 0;">
        <img src="webb.png">
    </div>


    <!-- 滾動偵測 JavaScript -->
    <script>
        function handleScroll() {
            const container = document.querySelector('.step1-scroll-container');
            const group1 = document.querySelectorAll('.step-group-1');
            const group2A = document.querySelectorAll('.step-group-2-A');
            const group2B = document.querySelectorAll('.step-group-2-B');
            const groupTransit = document.querySelectorAll('.step-group-transit');
            
            if (!container) return;

            // 取得步驟一容器相對於視窗的座標
            const rect = container.getBoundingClientRect();
            
            // 可滾動總高度
            const scrollableHeight = rect.height - window.innerHeight;
            
            // 計算進度 (0 ~ 1)
            let progress = -rect.top / scrollableHeight;
            progress = Math.max(0, Math.min(1, progress)); 

            // =======================================================
            // 💡 滾動進度分配（微調第一階段門檻，避免初始載入時誤觸）：
            // - 第一階段 (進度 >= 22%)：觸發 2、3（保證網頁剛載入時不出現圖片）
            // - 第二階段 (進度 >= 40%)：觸發 5、6
            // - 第三階段 (進度 >= 60%)：觸發 1、4
            // - 第四階段 (進度 >= 80%)：觸發 7（過渡圖疊在最上層覆蓋）
            // =======================================================
            
            // 第一組判定 (工作區域 2, 3)
            if (progress >= 0.22) {
                group1.forEach(step => step.classList.add('active'));
            } else {
                group1.forEach(step => step.classList.remove('active'));
            }

            // 第二組 A 判定 (工作區域 5, 6)
            if (progress >= 0.40) {
                group2A.forEach(step => step.classList.add('active'));
            } else {
                group2A.forEach(step => step.classList.remove('active'));
            }

            // 第二組 B 判定 (工作區域 1, 4)
            if (progress >= 0.60) {
                group2B.forEach(step => step.classList.add('active'));
            } else {
                group2B.forEach(step => step.classList.remove('active'));
            }

            // 過渡圖 7 判定
            if (progress >= 0.80) {
                groupTransit.forEach(step => step.classList.add('active'));
            } else {
                groupTransit.forEach(step => step.classList.remove('active'));
            }
        }

        // 綁定滾動事件
        window.addEventListener('scroll', handleScroll);
        // 頁面載入時先執行一次，確保初始狀態正確
        window.addEventListener('DOMContentLoaded', handleScroll);
    </script>
</body>
</html>
