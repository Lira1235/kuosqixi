<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>七夕收涎儀式流程</title>
    <style>
        /* 移除預設邊距，確保圖片 100% 滿版 */
        body {
            background-image: url('web工作區域 1.png');
            background-size: 100% auto;
            background-attachment: scroll;
            background-position: center top;
            background-repeat: no-repeat;
            min-height: 100vh;
            background-color: #a24731;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            overflow-x: hidden;
        }

        /* ─── 標題區 ─── */
        .title-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            box-sizing: border-box;
            padding: 0 20px;
            position: absolute; 
            top: 0;
            left: 0;
            z-index: 20; 
            background-color: transparent;
            pointer-events: none; 
            transform: translate3d(0, 0, 0);
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        h1 {
            text-align: center;
            color: #e99e9d;
            font-size: 8vw; 
            margin: 0;
            white-space: nowrap; 
            letter-spacing: 2px;
        }

        @media (min-width: 768px) {
            h1 {
                font-size: 60px;
            }
        }

        /* 內容區塊通用設定 (步驟二、三、四、五) */
        .content-section {
            width: 100%;
            margin-bottom: 60px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        /* 段落文字樣式 */
        p {
            text-align: left;
            font-size: 20px;
            line-height: 1.5;
            color: #ffffff;
            margin: 0 0 15px 0;
            padding: 0 15px;
            align-self: flex-start;
        }

        /* 圖片基本設定：開啟非同步解碼優化與硬體加速準備 */
        img {
            width: 100% !important;
            height: auto;
            display: block;
            box-shadow: none;
            border-radius: 0;
            transform: translateZ(0); /* 啟用 GPU 渲染加速 */
        }

        /* ========================================== 【步驟一】滾動粘性疊加區 CSS ========================================== */
        .step1-scroll-container {
            position: relative;
            height: 400vh; /* 縮短滾動軌道總長度，提升物理滑動的節奏感 */
            width: 100%;
        }

        /* 粘性定位框架 */
        .step1-sticky-frame {
            position: sticky;
            top: 0;
            height: 100vh;
            height: 100dvh;
            width: 100%;
            will-change: transform;
            transform: translate3d(0, 0, 0);
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        /* 步驟一內的每一張圖片容器 (硬體加速優化) */
        .step1-item {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: flex-start; /* 前面幾張圖對齊頂部 */
            opacity: 0; 
            transform: translate3d(0, 80px, 0); /* 初始皆位於下方，滑動時隨物理距離上移 */
            pointer-events: none;
            transition: none; 
            will-change: transform, opacity;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        /* 【重要優化】過渡圖 7 對齊畫面正中央，並做繪圖限制優化 */
        .step-7 {
            align-items: center !important; /* 確保工作區域 7 物理位移定位後處於螢幕正中央 */
            contain: paint;
            display: flex !important;
        }

        .img-wrapper {
            width: 100%;
        }
    </style>
</head>
<body>

    <!-- ─── 步驟一：獨立滾動疊加區 ─── -->
    <div class="step1-scroll-container">
        
        <!-- 標題放入滾動區頂部，達成原生、零卡頓的物理隨滑上移 -->
        <div class="title-container">
            <h1>七夕收涎儀式流程</h1>
        </div>

        <div class="step1-sticky-frame">

            <!-- 【階段一：第一次物理顯現】 -->
            <!-- 1. 工作區域 3 -->
            <div class="step1-item step-3" style="z-index: 10;">
                <div class="img-wrapper">
                    <img src="工作區域 3.png" decoding="async">
                </div>
            </div>

            <!-- 2. 工作區域 2 -->
            <div class="step1-item step-2" style="z-index: 5;">
                <div class="img-wrapper">
                    <img src="工作區域 2.png" decoding="async">
                </div>
            </div>

            <!-- 【階段二：下一次物理顯現（5、6 先出）】 -->
            <!-- 3. 工作區域 5 -->
            <div class="step1-item step-5" style="z-index: 9;">
                <div class="img-wrapper">
                    <img src="工作區域 5.png" decoding="async">
                </div>
            </div>

            <!-- 4. 工作區域 6 -->
            <div class="step1-item step-6" style="z-index: 8;">
                <div class="img-wrapper">
                    <img src="工作區域 6.png" decoding="async">
                </div>
            </div>

            <!-- 【階段三：最後物理顯現（1、4 後出）】 -->
            <!-- 5. 工作區域 1 -->
            <div class="step1-item step-1" style="z-index: 7;">
                <div class="img-wrapper">
                    <img src="工作區域 1.png" decoding="async">
                </div>
            </div>

            <!-- 6. 工作區域 4 -->
            <div class="step1-item step-4" style="z-index: 6;">
                <div class="img-wrapper">
                    <img src="工作區域 4.png" decoding="async">
                </div>
            </div>

            <!-- 【階段四：過渡圖 7，由下往上物理上滑至畫面中央，透明度達到 100%】 -->
            <!-- 7. 工作區域 7 -->
            <div class="step1-item step-7" style="z-index: 12;">
                <div class="img-wrapper">
                    <img src="工作區域 7.png" decoding="async">
                </div>
            </div>

        </div>
    </div>

    <!-- ─── 步驟二及後續內容 ─── -->
    <div class="content-section">
        <p>2.讓小孩的雙腳跨在戶碇兩旁。</p>
        <img src="web3.png" decoding="async" loading="lazy">
    </div>

    <div class="content-section">
        <p>3.用七夕粿擦嘴。</p>
        <img src="web4.png" decoding="async" loading="lazy">
    </div>

    <div class="content-section">
        <p>4.讓小孩咬一小口七夕粿吐在地上，家長唸：「丟一口粿，死後入土，乎六畜吞入肚，保我兒孫無事故。」</p>
        <img src="web5.png" decoding="async" loading="lazy">
    </div>

    <div class="content-section">
        <p>5.祭拜完後焚燒金紙，將胭脂置於屋頂 or 壁角，給織女打扮使用</p>
        <img src="web5.png" decoding="async" loading="lazy">
    </div>

    <div class="content-section" style="margin-bottom: 0;">
        <img src="webb.png" decoding="async" loading="lazy">
    </div>

    <!-- 滾動偵測 JavaScript (高效能硬體加速引擎) -->
    <script>
        // 物理進度線性內插計算
        function getInterpolatedValue(progress, start, end, fromVal, toVal) {
            if (progress < start) return fromVal;
            if (progress > end) return toVal;
            return fromVal + (toVal - fromVal) * ((progress - start) / (end - start));
        }

        let isTicking = false;

        function updateScrollEffects() {
            const container = document.querySelector('.step1-scroll-container');
            const stickyFrame = document.querySelector('.step1-sticky-frame');
            
            const img3 = document.querySelector('.step-3');
            const img2 = document.querySelector('.step-2');
            const img5 = document.querySelector('.step-5');
            const img6 = document.querySelector('.step-6');
            const img1 = document.querySelector('.step-1');
            const img4 = document.querySelector('.step-4');
            const img7 = document.querySelector('.step-7');

            if (!container || !stickyFrame) {
                isTicking = false;
                return;
            }

            // 計算滾動比例 progress (0 ~ 1)
            const rect = container.getBoundingClientRect();
            const scrollableHeight = rect.height - window.innerHeight;
            let progress = -rect.top / scrollableHeight;
            progress = Math.max(0, Math.min(1, progress));

            // =======================================================
            // 縮短後的步驟一時間軸 (0.05 -> 0.50)
            // =======================================================
            
            // 1. 階段一：工作區域 3 & 工作區域 2 (0.05 -> 0.25)
            const img3Opacity = getInterpolatedValue(progress, 0.05, 0.20, 0, 1);
            const img3Y = getInterpolatedValue(progress, 0.05, 0.20, 80, 0);
            if (img3) {
                img3.style.opacity = img3Opacity;
                img3.style.transform = `translate3d(0, ${img3Y}px, 0)`;
            }

            const img2Opacity = getInterpolatedValue(progress, 0.10, 0.25, 0, 1);
            const img2Y = getInterpolatedValue(progress, 0.10, 0.25, 80, 0);
            if (img2) {
                img2.style.opacity = img2Opacity;
                img2.style.transform = `translate3d(0, ${img2Y}px, 0)`;
            }

            // 2. 階段二：工作區域 5 & 工作區域 6 (0.20 -> 0.40)
            const img5Opacity = getInterpolatedValue(progress, 0.20, 0.35, 0, 1);
            const img5Y = getInterpolatedValue(progress, 0.20, 0.35, 80, 0);
            if (img5) {
                img5.style.opacity = img5Opacity;
                img5.style.transform = `translate3d(0, ${img5Y}px, 0)`;
            }

            const img6Opacity = getInterpolatedValue(progress, 0.25, 0.40, 0, 1);
            const img6Y = getInterpolatedValue(progress, 0.25, 0.40, 80, 0);
            if (img6) {
                img6.style.opacity = img6Opacity;
                img6.style.transform = `translate3d(0, ${img6Y}px, 0)`;
            }

            // 3. 階段三：工作區域 1 & 工作區域 4 (0.35 -> 0.50)
            // 步驟一的圖片在此階段會完全顯示並定位完成
            const img1Opacity = getInterpolatedValue(progress, 0.35, 0.45, 0, 1);
            const img1Y = getInterpolatedValue(progress, 0.35, 0.45, 30, 0);
            if (img1) {
                img1.style.opacity = img1Opacity;
                img1.style.transform = `translate3d(0, ${img1Y}px, 0)`;
            }

            const img4Opacity = getInterpolatedValue(progress, 0.40, 0.50, 0, 1);
            const img4Y = getInterpolatedValue(progress, 0.40, 0.50, 30, 0);
            if (img4) {
                img4.style.opacity = img4Opacity;
                img4.style.transform = `translate3d(0, ${img4Y}px, 0)`;
            }

            // =======================================================
            // 4. 階段四：過渡圖 7 由下往上物理上滑至【畫面中央】 (0.50 -> 0.75)
            // - 在滾動比例 0.75 時，過渡圖完全到達中心位置且透明度（Opacity）達到 100% (1.0)
            // =======================================================
            const img7Opacity = getInterpolatedValue(progress, 0.50, 0.75, 0, 1);
            const img7Y = getInterpolatedValue(progress, 0.50, 0.75, 80, 0);
            if (img7) {
                img7.style.opacity = img7Opacity;
                img7.style.transform = `translate3d(0, ${img7Y}px, 0)`;
            }

            // =======================================================
            // 5. 畫面短暫停留 & 整個步驟一粘性框架上移滑出 (0.85 -> 1.00)
            // - 確保過渡圖在畫面中央呈現 100% 透明度後，再慢慢隨滑動推離螢幕，無縫拉出步驟二
            // =======================================================
            const frameTranslateY = getInterpolatedValue(progress, 0.85, 1.00, 0, -100);
            stickyFrame.style.transform = `translate3d(0, ${frameTranslateY}vh, 0)`;

            isTicking = false;
        }

        // 使用 requestAnimationFrame 進行滾動物理節流，消除抖動與卡頓
        function onScroll() {
            if (!isTicking) {
                window.requestAnimationFrame(updateScrollEffects);
                isTicking = true;
            }
        }

        // 監聽滾動事件，使用 passive: true 提升行動裝置的滑動響應速度
        window.addEventListener('scroll', onScroll, { passive: true });
        window.addEventListener('DOMContentLoaded', updateScrollEffects);
    </script>
</body>
</html>
