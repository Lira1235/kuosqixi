<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>七夕收涎儀式流程</title>
    <style>
        /* 移除預設邊距，確保圖片 100% 滿版 */
        body {
            background-image: url('web工作區域 1.png');
            background-size: 100% auto;
            background-attachment: scroll;
            background-position: center top;
            background-repeat: no-repeat;
            min-height: 100vh;
            background-color: #a24731;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            overflow-x: hidden;
        }

        /* 標題區塊：剛進網頁時滿版（100vh），完全無圖片 */
        .title-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            box-sizing: border-box;
            padding: 0 20px;
            position: fixed; /* 改為 fixed 配合物理淡出，使其在第一階段能跟隨滾動平滑上移消失 */
            top: 0;
            left: 0;
            z-index: 20; 
            background-color: transparent;
            pointer-events: none; /* 避免阻擋下方滾動 */
            will-change: opacity, transform;
        }

        h1 {
            text-align: center;
            color: #e99e9d;
            font-size: 8vw; /* 隨螢幕寬度縮放 */
            margin: 0;
            white-space: nowrap; /* 強制在同一列 */
            letter-spacing: 2px;
        }

        @media (min-width: 768px) {
            h1 {
                font-size: 60px;
            }
        }

        /* 內容區塊通用設定 (步驟二、三、四、五) */
        .content-section {
            width: 100%;
            margin-bottom: 60px; /* 每個步驟之間的間距 */
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        /* 段落文字樣式 */
        p {
            text-align: left;
            font-size: 20px;
            line-height: 1.5;
            color: #ffffff;
            margin: 0 0 15px 0;
            padding: 0 15px;
            align-self: flex-start;
        }

        /* 圖片基本設定：完全貼合螢幕寬度，無圓角無陰影 */
        img {
            width: 100% !important;
            height: auto;
            display: block;
            box-shadow: none;
            border-radius: 0;
        }

        /* ========================================== 【步驟一】滾動粘性疊加區 CSS ========================================== */
        /* 步驟一專屬滾動容器 */
        .step1-scroll-container {
            position: relative;
            height: 500vh; /* 提供足夠的物理滾動距離 */
            width: 100%;
        }

        /* 粘性定位框架：完全貼合手機螢幕 */
        .step1-sticky-frame {
            position: sticky;
            top: 0;
            height: 100vh;
            height: 100dvh;
            width: 100%;
            will-change: transform;
        }

        /* 步驟一內的每一張圖片容器 */
        .step1-item {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: flex-start;
            opacity: 0; /* 預設完全隱藏，由 JS 物理滾動控制 */
            pointer-events: none;
            /* 移除 transition 改為 JS 純物理滾動數值控制，不拖泥帶水 */
            transition: none; 
            will-change: opacity, transform;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .img-wrapper {
            width: 100%;
        }
    </style>
</head>
<body>

    <!-- ─── 標題區 ─── -->
    <div class="title-container">
        <h1>七夕收涎儀式流程</h1>
    </div>

    <!-- ─── 步驟一：獨立滾動疊加區 ─── -->
    <div class="step1-scroll-container">
        <div class="step1-sticky-frame">

            <!-- 【階段一：第一次物理顯現】 -->
            <!-- 1. 工作區域 3 疊加順序：最上層 (z-index: 10) -->
            <div class="step1-item step-3" style="z-index: 10;">
                <div class="img-wrapper">
                    <img src="工作區域 3.png">
                </div>
            </div>

            <!-- 2. 工作區域 2 疊加順序：最底層 (z-index: 5) -->
            <div class="step1-item step-2" style="z-index: 5;">
                <div class="img-wrapper">
                    <img src="工作區域 2.png">
                </div>
            </div>

            <!-- 【階段二：下一次物理顯現（5、6 先出）】 -->
            <!-- 3. 工作區域 5 疊加順序：第二層 (z-index: 9) -->
            <div class="step1-item step-5" style="z-index: 9;">
                <div class="img-wrapper">
                    <img src="工作區域 5.png">
                </div>
            </div>

            <!-- 4. 工作區域 6 疊加順序：第三層 (z-index: 8) -->
            <div class="step1-item step-6" style="z-index: 8;">
                <div class="img-wrapper">
                    <img src="工作區域 6.png">
                </div>
            </div>

            <!-- 【階段三：最後物理顯現（1、4 後出，且位移縮短）】 -->
            <!-- 5. 工作區域 1 疊加順序：第四層 (z-index: 7) -->
            <div class="step1-item step-1" style="z-index: 7;">
                <div class="img-wrapper">
                    <img src="工作區域 1.png">
                </div>
            </div>

            <!-- 6. 工作區域 4 疊加順序：第五層 (z-index: 6) -->
            <div class="step1-item step-4" style="z-index: 6;">
                <div class="img-wrapper">
                    <img src="工作區域 4.png">
                </div>
            </div>

            <!-- 【階段四：過渡圖疊加在最上方，覆蓋步驟一所有圖】 -->
            <!-- 7. 工作區域 7 疊加順序：最上層覆蓋 (z-index: 12) -->
            <div class="step1-item step-7" style="z-index: 12;">
                <div class="img-wrapper">
                    <img src="工作區域 7.png">
                </div>
            </div>

        </div>
    </div>

    <!-- ─── 步驟二及後續內容 ─── -->
    <!-- 步驟 2 -->
    <div class="content-section">
        <p>2.讓小孩的雙腳跨在戶碇兩旁。</p>
        <img src="web3.png">
    </div>

    <!-- 步驟 3 -->
    <div class="content-section">
        <p>3.用七夕粿擦嘴。</p>
        <img src="web4.png">
    </div>

    <!-- 步驟 4 -->
    <div class="content-section">
        <p>4.讓小孩咬一小口七夕粿吐在地上，家長唸：「丟一口粿，死後入土，乎六畜吞入肚，保我兒孫無事故。」</p>
        <img src="web5.png">
    </div>

    <!-- 步驟 5 -->
    <div class="content-section">
        <p>5.祭拜完後焚燒金紙，將胭脂置於屋頂 or 壁角，給織女打扮使用</p>
        <img src="web5.png">
    </div>

    <!-- 結尾大圖 -->
    <div class="content-section" style="margin-bottom: 0;">
        <img src="webb.png">
    </div>

    <!-- 滾動偵測 JavaScript -->
    <script>
        // 輔助函式：計算特定區間內的物理進度與對應變數
        function getInterpolatedValue(progress, start, end, fromVal, toVal) {
            if (progress < start) return fromVal;
            if (progress > end) return toVal;
            const ratio = (progress - start) / (end - start);
            return fromVal + (toVal - fromVal) * ratio;
        }

        function handleScroll() {
            const container = document.querySelector('.step1-scroll-container');
            const stickyFrame = document.querySelector('.step1-sticky-frame');
            const title = document.querySelector('.title-container');
            
            // 各個圖片元素
            const img3 = document.querySelector('.step-3');
            const img2 = document.querySelector('.step-2');
            const img5 = document.querySelector('.step-5');
            const img6 = document.querySelector('.step-6');
            const img1 = document.querySelector('.step-1');
            const img4 = document.querySelector('.step-4');
            const img7 = document.querySelector('.step-7');

            if (!container || !stickyFrame) return;

            // 取得滾動區間進度
            const rect = container.getBoundingClientRect();
            const scrollableHeight = rect.height - window.innerHeight;
            let progress = -rect.top / scrollableHeight;
            progress = Math.max(0, Math.min(1, progress));

            // =======================================================
            // 1. 標題 (title) 物理滾動控制 (0% -> 20%)
            // - 滾動 0% ~ 20% 時，標題平滑上移 0px -> -80px 並淡出 (Opacity: 1 -> 0)
            // =======================================================
            const titleOpacity = getInterpolatedValue(progress, 0.0, 0.20, 1, 0);
            const titleTranslateY = getInterpolatedValue(progress, 0.0, 0.20, 0, -80);
            if (title) {
                title.style.opacity = titleOpacity;
                title.style.transform = `translate3d(0, ${titleTranslateY}px, 0)`;
                title.style.display = titleOpacity === 0 ? 'none' : 'flex';
            }

            // =======================================================
            // 2. 階段一：工作區域 3 & 工作區域 2 (15% -> 45%)
            // - 3.png：淡入 (0->1)，往上平移 (80px -> 0px)
            // - 2.png：物理延後出現（在 20% -> 45% 區間），淡入，平移 (80px -> 0px)
            // =======================================================
            const img3Opacity = getInterpolatedValue(progress, 0.15, 0.35, 0, 1);
            const img3Y = getInterpolatedValue(progress, 0.15, 0.35, 80, 0);
            if (img3) {
                img3.style.opacity = img3Opacity;
                img3.style.transform = `translate3d(0, ${img3Y}px, 0)`;
            }

            const img2Opacity = getInterpolatedValue(progress, 0.20, 0.45, 0, 1);
            const img2Y = getInterpolatedValue(progress, 0.20, 0.45, 80, 0);
            if (img2) {
                img2.style.opacity = img2Opacity;
                img2.style.transform = `translate3d(0, ${img2Y}px, 0)`;
            }

            // =======================================================
            // 3. 階段二：工作區域 5 & 工作區域 6 (35% -> 65%)
            // - 5.png：淡入 (0->1)，往上平移 (80px -> 0px)
            // - 6.png：物理延後出現（在 40% -> 65% 區間），淡入，平移 (80px -> 0px)
            // =======================================================
            const img5Opacity = getInterpolatedValue(progress, 0.35, 0.55, 0, 1);
            const img5Y = getInterpolatedValue(progress, 0.35, 0.55, 80, 0);
            if (img5) {
                img5.style.opacity = img5Opacity;
                img5.style.transform = `translate3d(0, ${img5Y}px, 0)`;
            }

            const img6Opacity = getInterpolatedValue(progress, 0.40, 0.65, 0, 1);
            const img6Y = getInterpolatedValue(progress, 0.40, 0.65, 80, 0);
            if (img6) {
                img6.style.opacity = img6Opacity;
                img6.style.transform = `translate3d(0, ${img6Y}px, 0)`;
            }

            // =======================================================
            // 4. 階段三：工作區域 1 & 工作區域 4 (55% -> 85%)
            // - 兩者位移量皆為較短的 30px。
            // - 1.png：淡入，平移 (30px -> 0px)
            // - 4.png：物理稍微延後出現（在 60% -> 85% 區間），淡入，平移 (30px -> 0px)
            // =======================================================
            const img1Opacity = getInterpolatedValue(progress, 0.55, 0.75, 0, 1);
            const img1Y = getInterpolatedValue(progress, 0.55, 0.75, 30, 0);
            if (img1) {
                img1.style.opacity = img1Opacity;
                img1.style.transform = `translate3d(0, ${img1Y}px, 0)`;
            }

            const img4Opacity = getInterpolatedValue(progress, 0.60, 0.85, 0, 1);
            const img4Y = getInterpolatedValue(progress, 0.60, 0.85, 30, 0);
            if (img4) {
                img4.style.opacity = img4Opacity;
                img4.style.transform = `translate3d(0, ${img4Y}px, 0)`;
            }

            // =======================================================
            // 5. 過渡圖 7 物理淡入 & 步驟一粘性框上滑移出 (75% -> 100%)
            // - 過渡圖 7：在滾動 75% -> 95% 時，透明度依物理距離漸顯 (0 -> 1)
            // - 粘性框架：在滾動 75% -> 100% 時，整體平滑上推 0vh -> -100vh
            // =======================================================
            const img7Opacity = getInterpolatedValue(progress, 0.75, 0.95, 0, 1);
            if (img7) {
                img7.style.opacity = img7Opacity;
            }

            const frameTranslateY = getInterpolatedValue(progress, 0.75, 1.00, 0, -100);
            stickyFrame.style.transform = `translate3d(0, ${frameTranslateY}vh, 0)`;
        }

        // 綁定滾動與載入事件
        window.addEventListener('scroll', handleScroll);
        window.addEventListener('DOMContentLoaded', handleScroll);
    </script>
</body>
</html>
